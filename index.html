<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#07091A;color:#E2E8F0;min-height:100vh}
.hdr{background:#0C1024;border-bottom:1px solid #1A2640;padding:12px 16px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-bar{height:8px;background:#1A2640;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#38BDF8,#A78BFA,#F472B6);transition:width .5s}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 16px}
.stat{background:#0C1024;border:1px solid #1A2640;border-radius:10px;padding:10px 12px}
.tabs{display:flex;gap:2px;border-bottom:1px solid #1A2640;padding:0 16px;flex-wrap:wrap}
.tab{padding:8px 16px;background:transparent;color:#64748B;border:none;cursor:pointer;font-size:13px;font-weight:500;border-radius:8px 8px 0 0;transition:all .2s}
.tab.on{background:#38BDF8;color:#000;font-weight:700}
.content{padding:14px 16px 60px;max-width:1060px;margin:0 auto}
.card{background:#0C1024;border:1px solid #1A2640;border-radius:12px;padding:14px;margin-bottom:12px}
.vid{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid #1A2640;cursor:pointer;transition:all .2s;margin-bottom:8px;background:#101828}
.vid:hover{border-color:#334155}
.vid.done{opacity:.75}
.cal{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-h{text-align:center;padding:8px 4px;font-size:11px;font-weight:700;background:#101828;border-bottom:1px solid #1A2640}
.cell{min-height:82px;padding:5px 6px;border-right:1px solid #1A2640;border-bottom:1px solid #1A2640;cursor:pointer;transition:background .15s;font-size:12px;background:#0C1024}
.cell:hover{background:#101828}
.cell.today{background:#38BDF818!important;outline:2px solid #38BDF8;outline-offset:-2px}
.cell.sel{outline:1px solid #818CF855;outline-offset:-2px}
.cell.rest{background:#07091A!important;cursor:default}
.btn{background:#101828;border:1px solid #1A2640;color:#E2E8F0;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:14px;transition:background .15s}
.btn:hover{background:#1A2640}
.nav-bar{display:flex;align-items:center;gap:10px;background:#0C1024;border:1px solid #1A2640;border-radius:10px;padding:10px 12px;margin-bottom:12px}
input[type=checkbox]{width:17px;height:17px;cursor:pointer;flex-shrink:0}
textarea{width:100%;min-height:380px;background:#0C1024;border:1px solid #1A2640;border-radius:10px;padding:14px;color:#E2E8F0;font-size:13px;line-height:1.85;resize:vertical;font-family:monospace;outline:none}
.mini-bar{height:4px;background:#1A2640;border-radius:2px;overflow:hidden;margin-top:4px}
.mini-fill{height:100%;border-radius:2px;transition:width .5s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.phases{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.sec-list{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sec-item{display:flex;align-items:center;gap:6px;padding:4px 7px;background:#101828;border-radius:5px;border:1px solid #1A2640;font-size:11px}
.save-badge{position:fixed;bottom:16px;right:16px;background:#34D399;color:#000;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-badge.show{opacity:1}
.streak-box{background:#0C1024;border:1px solid #1A2640;border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
@media(max-width:600px){.phases{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}

function gt(id){return VT[id]||'Lecture '+id;}
const START_DS='2026-03-14';
const END_DS='2026-07-13';
const TOTAL_DAYS=122;
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ─── SCHEDULE BUILD ───────────────────────────────────────────────────────────
function buildSchedule(){
  var r=[],vi=0,sd=0;
  var av=[];
  SECS.forEach(function(s){for(var v=s.s;v<=s.e;v++)av.push({id:v,sec:s});});
  for(var d=0;d<TOTAL_DAYS;d++){
    var dt=new Date(START_DS+'T12:00:00');
    dt.setDate(dt.getDate()+d);
    var dow=dt.getDay();
    var ds=dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());
    var isR=dow===0,vs=[];
    if(!isR&&vi<av.length){sd++;var cnt=Math.min(sd<=34?5:4,av.length-vi);vs=av.slice(vi,vi+cnt);vi+=cnt;}
    var ph=vs.length>0?vs[0].sec.p:(r.length>0?r[r.length-1].phase:1);
    r.push({ds:ds,day:d+1,dow:dow,isR:isR,vs:vs,phase:ph});
  }
  return r;
}
function pad(n){return String(n).padStart(2,'0');}
var SCH=buildSchedule();

// ─── TODAY (REAL CLOCK — updates every open) ──────────────────────────────────
function getToday(){
  var t=new Date();
  var ds=t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());
  if(ds<START_DS)return START_DS;
  if(ds>END_DS)return END_DS;
  return ds;
}
var TODAY=getToday(); // locked for this session

function fmtDate(ds){
  var d=new Date(ds+'T12:00:00');
  return DN[d.getDay()]+', '+d.getDate()+' '+MN[d.getMonth()]+' '+d.getFullYear();
}
function getPhaseRange(vidS,vidE){
  var fd=SCH.find(function(s){return s.vs.some(function(v){return v.id===vidS;});});
  var ld=[].concat(SCH).reverse().find(function(s){return s.vs.some(function(v){return v.id===vidE;});});
  if(!fd||!ld)return'–';
  var f=new Date(fd.ds+'T12:00:00'),l=new Date(ld.ds+'T12:00:00');
  return MN[f.getMonth()].slice(0,3)+' '+f.getDate()+' – '+MN[l.getMonth()].slice(0,3)+' '+l.getDate();
}

// ─── PERSISTENT STATE (localStorage) ─────────────────────────────────────────
var STORE_KEY='dsa_tracker_v2';
function loadState(){
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}
function saveState(){
  var obj={
    done:[...done],
    potd:[...potd],
    notes:notes,
    tab:tab,
    selDs:selDs,
    calMo:calMo,
    savedAt:new Date().toISOString()
  };
  try{localStorage.setItem(STORE_KEY,JSON.stringify(obj));}catch(e){}
  flashSave();
}
function flashSave(){
  var b=document.getElementById('save-badge');
  if(!b)return;
  b.classList.add('show');
  clearTimeout(window._saveT);
  window._saveT=setTimeout(function(){b.classList.remove('show');},1200);
}

var potd  = saved&&saved.potd  ? new Set(saved.potd)  : new Set();
var notes = saved&&saved.notes ? saved.notes : defaultNotes();
var tab   = saved&&saved.tab   ? saved.tab   : 'dashboard';
var selDs = saved&&saved.selDs ? saved.selDs : TODAY;

function calcStreak(){
  var streak=0,d=new Date(TODAY+'T12:00:00');
  while(true){
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if(ds<START_DS)break;
    var ent=SCH.find(function(s){return s.ds===ds;});
    if(!ent)break;
    if(ent.isR){d.setDate(d.getDate()-1);continue;}
    var allVDone=ent.vs.length>0&&ent.vs.every(function(v){return done.has(v.id);});
    var pDone=potd.has(ds);
    if(allVDone||pDone){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

window.togglePotd=function(ds){potd.has(ds)?potd.delete(ds):potd.add(ds);saveState();render();};

window.nextMo=function(){calMo=Math.min(MONTHS.length-1,calMo+1);saveState();render();};
window.navDay=function(dir){

  saveState();render();
};
window.gotoToday=function(){selDs=TODAY;saveState();render();};
window.notesChange=function(v){notes=v;saveState();};
window.resetAll=function(){
  if(!confirm('Reset ALL progress? This cannot be undone.'))return;
  done=new Set();potd=new Set();saveState();render();
};

render();

// Refresh TODAY at midnight without losing state
var msToMidnight=(function(){
  var n=new Date(),m=new Date(n);
  m.setHours(24,0,0,0);return m-n;
})();
setTimeout(function(){TODAY=getToday();render();},msToMidnight);
